  <text x="186" y="164" font-size="13" text-anchor="middle">🔊</text>
  <text x="24" y="202" font-size="18" fill="#3f3f46">house, home</text>
  <text x="24" y="226" font-size="13" fill="#71717a">/ɦœys/ · huis</text>

  <line x1="24" y1="250" x2="366" y2="250" stroke="#f0f0f2"/>

  <!-- senses -->
  <text x="24" y="282" font-size="12" font-weight="700" letter-spacing="0.6" fill="#71717a">MEANINGS</text>
  <text x="24" y="308" font-size="14.5" fill="#18181b">1. a building for living in</text>
  <text x="24" y="332" font-size="14.5" fill="#18181b">2. household; family</text>

  <!-- forms table, flat hairline -->
  <text x="24" y="370" font-size="12" font-weight="700" letter-spacing="0.6" fill="#71717a">FORMS</text>
  <rect x="24" y="382" width="342" height="96" rx="12" fill="#ffffff" stroke="#e7e7ea"/>
  <text x="40" y="412" font-size="11" letter-spacing="0.4" fill="#a1a1aa">ARTICLE</text>
  <text x="350" y="412" font-size="14" font-weight="600" fill="#18181b" text-anchor="end">het</text>
  <line x1="40" y1="428" x2="350" y2="428" stroke="#f2f2f4"/>
  <text x="40" y="448" font-size="11" letter-spacing="0.4" fill="#a1a1aa">PLURAL</text>
  <text x="350" y="448" font-size="14" font-weight="600" fill="#18181b" text-anchor="end">huizen</text>
  <line x1="40" y1="464" x2="350" y2="464" stroke="#f2f2f4"/>
  <text x="40" y="484" font-size="11" letter-spacing="0.4" fill="#a1a1aa">DIMINUTIVE</text>
  <text x="350" y="484" font-size="14" font-weight="600" fill="#18181b" text-anchor="end">huisje</text>

  <!-- example -->
  <text x="24" y="524" font-size="12" font-weight="700" letter-spacing="0.6" fill="#71717a">EXAMPLE</text>
  <rect x="24" y="536" width="342" height="68" rx="12" fill="#fafafa" stroke="#f0f0f2"/>
  <text x="40" y="566" font-size="14" font-weight="600" fill="#18181b">Ik ga naar huis.</text>
  <text x="40" y="588" font-size="13" fill="#71717a">I'm going home.</text>

  <!-- nav -->
  <rect x="24" y="724" width="163" height="52" rx="12" fill="#ffffff" stroke="#e7e7ea"/>
