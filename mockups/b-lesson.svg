<svg xmlns="http://www.w3.org/2000/svg" width="390" height="800" viewBox="0 0 390 800" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <rect width="390" height="800" fill="#ffffff"/>

  <!-- topbar -->
  <text x="24" y="58" font-size="20" fill="#71717a">✕</text>
  <text x="195" y="58" font-size="15" font-weight="700" fill="#09090b" text-anchor="middle">Lesson 3 / 12</text>

  <!-- progress -->
  <rect x="24" y="76" width="342" height="4" rx="2" fill="#f0f0f2"/>
  <rect x="24" y="76" width="86" height="4" rx="2" fill="#2563eb"/>

  <!-- hero word, no plate -->
  <text x="24" y="124" font-size="11.5" font-weight="600" letter-spacing="0.8" fill="#2563eb">NOUN · HUIS</text>
  <text x="24" y="172" font-size="42" font-weight="800" fill="#09090b" letter-spacing="-1">huis</text>
