<svg xmlns="http://www.w3.org/2000/svg" width="390" height="800" viewBox="0 0 390 800" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <rect width="390" height="800" fill="#ffffff"/>

  <!-- full-bleed prompt area, no plate -->
  <rect x="0" y="0" width="390" height="600" fill="#2563eb"/>
  <!-- progress hairline at very top -->
  <rect x="0" y="0" width="390" height="4" fill="#1e40af"/>
  <rect x="0" y="0" width="160" height="4" fill="#93c5fd"/>

  <!-- top row: quit + counters -->
  <text x="24" y="60" font-size="20" fill="#ffffff" fill-opacity="0.9">✕</text>
  <text x="300" y="58" font-size="14" font-weight="600" fill="#ffffff">✓ 8</text>
  <text x="366" y="58" font-size="14" font-weight="600" fill="#ffffff" fill-opacity="0.8" text-anchor="end">14 left</text>

  <!-- word, floating, no card -->
  <text x="195" y="330" font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">gezellig</text>
  <circle cx="195" cy="382" r="20" fill="#ffffff" fill-opacity="0.18"/>
  <text x="195" y="389" font-size="16" text-anchor="middle">🔊</text>

  <!-- bottom: direction label + flat input, no box, no submit -->
  <text x="195" y="654" font-size="13" fill="#71717a" text-anchor="middle">
    <tspan>Dutch </tspan><tspan font-weight="700" fill="#09090b">→ English</tspan>
  </text>

  <!-- flat input: cursor + placeholder + check, hairline under -->
  <text x="40" y="712" font-size="22" fill="#2563eb">|</text>
  <text x="52" y="712" font-size="20" fill="#b8b8bf">Your response</text>
  <circle cx="346" cy="705" r="14" fill="none" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="346" y="711" font-size="13" fill="#a1a1aa" text-anchor="middle">✓</text>
  <line x1="24" y1="734" x2="366" y2="734" stroke="#e7e7ea" stroke-width="1.5"/>

  <text x="195" y="784" font-size="11" fill="#d4d4d8" text-anchor="middle">Review / Quiz</text>
</svg>
