<svg xmlns="http://www.w3.org/2000/svg" width="390" height="800" viewBox="0 0 390 800" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <rect width="390" height="800" fill="#ffffff"/>

  <!-- topbar -->
  <text x="24" y="58" font-size="22" fill="#71717a">‹</text>
  <text x="195" y="58" font-size="17" font-weight="700" fill="#09090b" text-anchor="middle" letter-spacing="-0.3">Word</text>

  <!-- hero -->
  <text x="195" y="132" font-size="40" font-weight="800" fill="#09090b" text-anchor="middle" letter-spacing="-1">gezellig</text>
  <circle cx="278" cy="118" r="16" fill="#eff6ff"/>
  <text x="278" y="124" font-size="13" text-anchor="middle">🔊</text>
  <text x="195" y="160" font-size="15" fill="#71717a" text-anchor="middle">cozy, sociable, convivial</text>
  <text x="195" y="184" font-size="13" fill="#a1a1aa" text-anchor="middle">/ɣəˈzɛləx/ · ge·zel·lig</text>

  <!-- srs status row -->
  <rect x="24" y="206" width="342" height="52" rx="12" fill="#ffffff" stroke="#e7e7ea"/>
  <text x="40" y="237" font-size="13.5" fill="#71717a">Status</text>
  <rect x="280" y="220" width="70" height="24" rx="12" fill="#7c3aed"/>
  <text x="315" y="237" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Guru I</text>

  <!-- meanings -->
  <text x="24" y="294" font-size="12" font-weight="700" letter-spacing="0.6" fill="#71717a">MEANINGS</text>
  <text x="24" y="320" font-size="14.5" fill="#18181b">1. cozy, snug  <tspan fill="#a1a1aa" font-size="11">ADJ</tspan></text>
  <text x="24" y="344" font-size="14.5" fill="#18181b">2. sociable, convivial</text>
  <text x="24" y="364" font-size="13" fill="#71717a">уютный, приятный</text>

  <line x1="24" y1="388" x2="366" y2="388" stroke="#f0f0f2"/>

  <!-- examples -->
  <text x="24" y="420" font-size="12" font-weight="700" letter-spacing="0.6" fill="#71717a">EXAMPLES</text>
  <rect x="24" y="432" width="342" height="76" rx="12" fill="#fafafa" stroke="#f0f0f2"/>
  <text x="40" y="460" font-size="14" font-weight="600" fill="#18181b">Het was een gezellige avond.</text>
  <text x="40" y="482" font-size="13" fill="#71717a">It was a pleasant evening.</text>
  <text x="40" y="500" font-size="13" fill="#a1a1aa">Это был приятный вечер.</text>

  <!-- relations -->
  <text x="24" y="544" font-size="12" font-weight="700" letter-spacing="0.6" fill="#71717a">RELATED</text>
  <g font-size="13">
    <text x="24" y="572" fill="#a1a1aa">syn</text>
    <rect x="60" y="558" width="58" height="22" rx="8" fill="#f4f4f5"/>
    <text x="89" y="573" fill="#3f3f46" text-anchor="middle">knus</text>
    <rect x="126" y="558" width="74" height="22" rx="8" fill="#f4f4f5"/>
    <text x="163" y="573" fill="#3f3f46" text-anchor="middle">behaaglijk</text>
  </g>

  <!-- usage tags -->
  <g font-size="11">
    <rect x="24" y="600" width="62" height="22" rx="8" fill="#fef2f2"/>
    <text x="55" y="615" fill="#dc2626" text-anchor="middle">INFORMAL</text>
    <rect x="94" y="600" width="58" height="22" rx="8" fill="#f4f4f5"/>
    <text x="123" y="615" fill="#71717a" text-anchor="middle">SOCIAL</text>
